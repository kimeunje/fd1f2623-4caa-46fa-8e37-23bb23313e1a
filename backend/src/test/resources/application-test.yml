spring:
  datasource:
    url: jdbc:h2:mem:secuhub-test;DB_CLOSE_DELAY=-1;MODE=MariaDB
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true

logging:
  level:
    com.secuhub: DEBUG