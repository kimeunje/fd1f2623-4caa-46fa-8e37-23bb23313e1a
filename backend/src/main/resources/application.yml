spring:
  application:
    name: secuhub

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

  # Phase 5-1: Flyway 기본 비활성화 (dev/test는 Hibernate ddl-auto: create 유지)
  # prod 프로필에서만 application-prod.yml에 의해 활성화됨
  flyway:
    enabled: false

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-change-in-production-must-be-at-least-256-bits-long-for-hs256}
    expiration-minutes: ${JWT_EXPIRATION:480}
  storage:
    path: ${STORAGE_PATH:./storage}
  scripts:
    base-dir: ${SCRIPTS_BASE_DIR:./scripts}
    timeout-seconds: ${SCRIPTS_TIMEOUT:300}
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:3000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /api-docs