spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      # Phase 5-1: Flyway가 스키마를 관리하므로 Hibernate는 검증만 수행
      ddl-auto: validate
    show-sql: false

  # Phase 5-1: Flyway 마이그레이션 활성화 (prod 전용)
  # 실행 순서: Flyway 마이그레이션 → Hibernate validate
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true       # 기존 운영 DB(Phase 2 반영분)에 처음 적용 시 V1을 baseline으로 등록
    baseline-version: 0             # V1 부터 순차 적용
    validate-on-migrate: true
    out-of-order: false

# ============================================================================
# v18.8.3 — 운영 환경 데이터 저장 위치 (Linux FHS 표준)
# ============================================================================
# jar 실행 디렉토리와 분리 — 백업/유지보수/권한 관리 정합.
#
# 디렉토리 구조:
#   /var/lib/secuhub/
#   ├── scripts/             ← Python 스크립트 (UUID 기반)
#   │   ├── {uuid}.py        ← ScriptManagementService 가 생성
#   │   └── templates/
#   │       └── selenium_wrapper.py     ← 공통 helper (수동 배치)
#   └── storage/             ← 증빙 자산 + 진단 산출
#       ├── assets/{id%1000}/{id}      ← EvidenceAsset 파일
#       └── output/{jobId}/{executionId}/   ← 실행 산출 + _diagnosis.json
#
# 백업: tar -czf backup-$(date +%F).tar.gz /var/lib/secuhub/
# 권한: chown -R <jar-user>:<group> /var/lib/secuhub
# ============================================================================
app:
  scripts:
    base-dir: /home/scripts
    framework-dir: /home/scripts-framework
    python-command: python3.11
  storage:
    path: /home/storage
    output-retention-days: 30     # 실행 산출 디렉터리 보관일수. 0 이하면 GC 비활성
    output-gc-cron: "0 30 3 * * *" # (선택) 6필드 cron. 기본 매일 03:30

  security:
    ip-acl:
      # nginx 등 reverse proxy 뒤에 있으면 true (X-Forwarded-For 첫 hop 신뢰).
      # 폐쇄망 직결이면 false 그대로.
      trust-forwarded-header: false
      # break-glass: 계정별 규칙과 무관하게 항상 허용할 비상 대역.
      # 운영자가 자기 IP 를 잘못 제한해 잠기는 사고 방지용. 기본 비어 있음.
      always-allow: []
        # - 10.10.0.0/16

    login-rate-limit:
      enabled: true
      max-attempts: 5
      window-minutes: 15

        # v19.10 — 업로드 파일 검증
    upload:
      enabled: true
      verify-magic-bytes: true
      max-size-bytes: 52428800           # 50MB (multipart 상한과 정렬)
      allowed-extensions:                # 운영 정책에 맞게 가감 (예: zip 제거)
        - pdf
        - doc
        - docx
        - xls
        - xlsx
        - ppt
        - pptx
        - hwp
        - hwpx
        - png
        - jpg
        - jpeg
        - gif
        - txt
        - csv
        - zip  

logging:
  level:
    com.secuhub: INFO
    org.flywaydb: INFO

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false